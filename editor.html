<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 편집 - 과학 문제 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            과학 문제 생성기
        </a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">업로드</a></li>
            <li><a href="editor.html" class="nav-link active">편집기</a></li>
            <li><a href="storage.html" class="nav-link">저장소</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;">
                <div>
                    <h1>문제 편집</h1>
                    <p>생성된 문제를 검토하고 수정한 뒤 저장하세요.</p>
                </div>
                <a href="index.html" class="btn btn-outline btn-sm">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    업로드로
                </a>
            </div>
        </div>

        <div class="demo-banner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span><strong>브라우저 전용 버전:</strong> 저장한 문제는 브라우저 로컬 스토리지에 보관됩니다. 브라우저를 닫아도 유지됩니다.</span>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">총 문제 <span class="stat-value" id="total-count">0</span></div>
            <div class="stat-item">객관식 <span class="stat-value" id="mc-count">0</span></div>
            <div class="stat-item">서술형 <span class="stat-value" id="sa-count">0</span></div>
        </div>

        <div id="questions-container"></div>

        <div id="empty-state" class="card" style="display:none">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <h3>생성된 문제가 없습니다</h3>
                <p>업로드 페이지에서 PDF를 분석하고 문제를 생성해보세요.</p>
                <a href="index.html" class="btn btn-primary" style="margin-top:1.25rem;">
                    PDF 업로드하러 가기
                </a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        renderEditorQuestions();
    </script>
</body>
</html>

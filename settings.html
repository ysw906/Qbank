<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 생성 설정 - 과학 문제 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            과학 문제 생성기
        </a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">업로드</a></li>
            <li><a href="editor.html" class="nav-link">편집기</a></li>
            <li><a href="storage.html" class="nav-link">저장소</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>문제 생성 설정</h1>
            <p>단원을 선택하고 문제 생성 옵션을 설정하세요.</p>
        </div>

        <div class="demo-banner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span><strong>브라우저 전용 버전:</strong> 샘플 문제가 생성됩니다. PDF에서 추출된 단원이 표시됩니다.</span>
        </div>

        <div class="card" style="margin-bottom:1rem;">
            <div class="section-title">단원 선택</div>
            <div class="checkbox-group" id="chapter-list"></div>
        </div>

        <div class="grid-2" style="margin-bottom:1rem;">
            <div class="card">
                <div class="form-group">
                    <label class="form-label">문제 수</label>
                    <select id="q-count" class="form-control">
                        <option value="3">3문제</option>
                        <option value="5" selected>5문제</option>
                        <option value="7">7문제</option>
                        <option value="10">10문제</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">문제 유형</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="q-type" value="multiple_choice" id="type-mc">
                            <label for="type-mc">객관식</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="q-type" value="short_answer" id="type-sa">
                            <label for="type-sa">서술형</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="q-type" value="mixed" id="type-mix" checked>
                            <label for="type-mix">혼합</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">난이도</label>
                    <div class="radio-group" style="flex-direction:column;">
                        <div class="radio-item" style="min-width:unset;">
                            <input type="radio" name="difficulty" value="easy" id="diff-easy">
                            <label for="diff-easy" style="text-align:left;padding:.6rem .85rem;">
                                쉬움 <span style="font-weight:400;color:var(--text-muted);">— 기본 개념 확인</span>
                            </label>
                        </div>
                        <div class="radio-item" style="min-width:unset;">
                            <input type="radio" name="difficulty" value="medium" id="diff-medium" checked>
                            <label for="diff-medium" style="text-align:left;padding:.6rem .85rem;">
                                보통 <span style="font-weight:400;color:var(--text-muted);">— 개념 적용 및 이해</span>
                            </label>
                        </div>
                        <div class="radio-item" style="min-width:unset;">
                            <input type="radio" name="difficulty" value="hard" id="diff-hard">
                            <label for="diff-hard" style="text-align:left;padding:.6rem .85rem;">
                                어려움 <span style="font-weight:400;color:var(--text-muted);">— 심화 사고 및 분석</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center;">
            <button class="btn btn-primary btn-lg" onclick="generateQuestions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                문제 생성하기
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>renderSettings();</script>
</body>
</html>

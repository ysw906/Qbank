<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제 저장소 - 과학 문제 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            과학 문제 생성기
        </a>
        <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link">업로드</a></li>
            <li><a href="editor.html" class="nav-link">편집기</a></li>
            <li><a href="storage.html" class="nav-link active">저장소</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>문제 저장소</h1>
            <p>저장된 문제를 확인하고 수정하거나 재사용할 수 있습니다.</p>
        </div>

        <div class="filter-bar" id="filter-bar">
            <span class="filter-label">단원</span>
            <button class="btn btn-sm btn-primary" onclick="filterByChapter(null)" id="filter-all">전체</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">저장된 문제 <span class="stat-value" id="storage-count">0</span></div>
        </div>

        <div id="storage-container"></div>

        <div id="empty-state" class="card" style="display:none">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <h3>저장된 문제가 없습니다</h3>
                <p>문제를 생성하고 저장하면 여기에 표시됩니다.</p>
                <a href="index.html" class="btn btn-primary" style="margin-top:1.25rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    문제 생성하러 가기
                </a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        renderStorageQuestions();
    </script>
</body>
</html>
